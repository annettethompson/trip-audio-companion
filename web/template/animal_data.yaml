---
# Colorado Mountain Wildlife — Glenwood Springs to Leadville Corridor
# Sources: Colorado Parks and Wildlife, iNaturalist CC-BY, Wikimedia Commons
# All photo URLs are CC-licensed or public domain

animals:

  - common_name: "Mule Deer"
    scientific_name: "Odocoileus hemionus"
    habitat: "Gambel oak thickets, canyon slopes, forest edges, meadows"
    elevation_range: "3,500–10,000 ft (moves seasonally)"
    active_time: "Dawn and dusk (crepuscular); rests in brush midday"
    interesting_fact: "Named for their large mule-like ears that can move independently. In late May does are giving birth to spotted fawns — fawns found alone are NOT orphaned, the mother is nearby and returns to nurse."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/Mule_Deer_Odocoileus_hemionus_-_Mather_Campground.jpg/800px-Mule_Deer_Odocoileus_hemionus_-_Mather_Campground.jpg"
    photo_credit: "Wikimedia Commons / National Park Service (public domain)"
    where_to_spot: "Gambel oak hillsides around Glenwood Springs; meadows along Highway 82 toward Carbondale at dawn/dusk"

  - common_name: "Rocky Mountain Elk"
    scientific_name: "Cervus canadensis"
    habitat: "Open meadows, forest edges, mountain parks"
    elevation_range: "5,000–11,000 ft (migrates seasonally)"
    active_time: "Dawn and dusk; herds may be visible in meadows morning and evening"
    interesting_fact: "The bugling call of bull elk in September is one of the most distinctive sounds in the American West. In late May, elk are migrating upward from winter range — look for small groups in the Roaring Fork Valley meadows south of Glenwood Springs."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Rocky_Mountain_Elk.jpg/800px-Rocky_Mountain_Elk.jpg"
    photo_credit: "Wikimedia Commons / USFWS (public domain)"
    where_to_spot: "Meadows along Highway 82 between Glenwood Springs and Carbondale; early morning"

  - common_name: "American Black Bear"
    scientific_name: "Ursus americanus"
    habitat: "Gambel oak thickets, riparian corridors, aspen/conifer forest"
    elevation_range: "4,000–11,000 ft"
    active_time: "Dawn, dusk, and night; most active in spring and fall while foraging intensively"
    interesting_fact: "Black bears are not actually always black — in Colorado they are often brown, cinnamon, or blonde. In late May they are recently out of dens and intensely hungry, foraging on spring grasses, insects, and whatever they can find before berries ripen in July. Their sense of smell is 7x stronger than a bloodhound's."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Black_bear_large.jpg/800px-Black_bear_large.jpg"
    photo_credit: "Wikimedia Commons / Yathin S Krishnappa (CC-BY-SA)"
    where_to_spot: "Oak thickets on canyon slopes; occasionally in town at dawn/dusk. Never leave food in vehicles."

  - common_name: "Rocky Mountain Bighorn Sheep"
    scientific_name: "Ovis canadensis"
    habitat: "Rocky canyon walls, cliff faces, steep talus slopes"
    elevation_range: "5,000–14,000 ft"
    active_time: "Daytime — diurnal"
    interesting_fact: "Their hooves have a hard outer edge for traction and a soft inner pad for grip — engineered for moving at speed on near-vertical rock. In late May ewes are lambing on ledges that seem impossible — the lambs are walking within hours of birth. Look for them on the canyon walls along I-70 east of Glenwood Springs."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/Rocky_Mountain_Bighorn_Sheep.jpg/800px-Rocky_Mountain_Bighorn_Sheep.jpg"
    photo_credit: "Wikimedia Commons / Acroterion (CC-BY-SA)"
    where_to_spot: "Rocky canyon walls along I-70 east of Glenwood Springs; Dotsero area canyon walls"

  - common_name: "Mountain Goat"
    scientific_name: "Oreamnos americanus"
    habitat: "Alpine and subalpine cliffs, rocky terrain above treeline"
    elevation_range: "Above 11,000 ft in summer; descends in winter"
    active_time: "Daytime"
    interesting_fact: "Mountain goats are not actually goats — they are more closely related to chamois and musk oxen. Their split hooves have hard outer edges for traction and soft inner pads for grip on rock. They are the only large mammal that consistently occupies alpine terrain year-round."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Mountain_goat_US_FWS.jpg/800px-Mountain_goat_US_FWS.jpg"
    photo_credit: "Wikimedia Commons / USFWS (public domain)"
    where_to_spot: "Higher elevations near Leadville; Mount Evans and Mount Bross areas"

  - common_name: "Pronghorn"
    scientific_name: "Antilocapra americana"
    habitat: "Open sagebrush grasslands and shrubsteppe — lower elevations only"
    elevation_range: "Below 7,000 ft"
    active_time: "Daytime"
    interesting_fact: "Pronghorn are the fastest land animal in the Western Hemisphere, capable of 55 mph. They evolved running speed in response to now-extinct predators (American cheetah, American lion) — they run much faster than any current predator requires. They are the only surviving member of a uniquely North American family of animals."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Antilocapra_americana_male.jpg/800px-Antilocapra_americana_male.jpg"
    photo_credit: "Wikimedia Commons / Alan D. Wilson (CC-BY-SA)"
    where_to_spot: "Sagebrush flats on Highway 40 near Craig; lower San Luis Valley near Great Sand Dunes"

  - common_name: "Osprey"
    scientific_name: "Pandion haliaetus"
    habitat: "Rivers, lakes — anywhere with fish and nest sites near water"
    elevation_range: "Along rivers from 4,000–8,000 ft"
    active_time: "Daytime — active hunter during daylight hours"
    interesting_fact: "Osprey are the only North American raptor that dives completely underwater to catch fish. Their feet have reversible outer toes and rough, spiny pads for gripping slippery fish. In late May they are actively nesting on platform nests on power poles, bridges, and tall riverside trees — watch for them hovering 30–60 feet above the Colorado River before plunging."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Osprey_in_flight.jpg/800px-Osprey_in_flight.jpg"
    photo_credit: "Wikimedia Commons / Imran Shah (CC-BY-SA)"
    where_to_spot: "Colorado River through Glenwood Canyon and Glenwood Springs; look for platform nests on power poles"

  - common_name: "Bald Eagle"
    scientific_name: "Haliaeetus leucocephalus"
    habitat: "Rivers, lakes, reservoirs — near water with fish"
    elevation_range: "Along major rivers, typically below 9,000 ft"
    active_time: "Daytime"
    interesting_fact: "The Colorado River corridor is a recognized winter concentration area for bald eagles, but some remain year-round near fish-rich sections. Adults are unmistakable with their white head and tail (which develops at age 4–5). Immature birds are mottled brown and white — often mistaken for golden eagles."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Bald_Eagle_Alaska.jpg/800px-Bald_Eagle_Alaska.jpg"
    photo_credit: "Wikimedia Commons / USFWS (public domain)"
    where_to_spot: "Colorado River near Glenwood Springs; Ruedi Reservoir near Basalt"

  - common_name: "Golden Eagle"
    scientific_name: "Aquila chrysaetos"
    habitat: "Open mountain slopes, canyon rims, grasslands adjacent to cliffs"
    elevation_range: "4,000–12,000 ft"
    active_time: "Daytime — uses thermals and canyon updrafts for soaring"
    interesting_fact: "Golden eagles hunt by soaring on canyon updrafts and diving at speeds exceeding 150 mph. They primarily hunt ground squirrels, rabbits, and prairie dogs, but occasionally take mule deer fawns. The golden sheen on the back of the head and neck is visible in good light and distinguishes them from bald eagles."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/Aquila_chrysaetos_1_2.jpg/800px-Aquila_chrysaetos_1_2.jpg"
    photo_credit: "Wikimedia Commons / Tony Hisgett (CC-BY)"
    where_to_spot: "Canyon walls along I-70 through Glenwood Canyon; soaring on thermals above canyon rims"

  - common_name: "Great Blue Heron"
    scientific_name: "Ardea herodias"
    habitat: "Rivers, ponds, wetlands, lake edges"
    elevation_range: "Along rivers up to 8,000 ft"
    active_time: "Daytime — hunts by standing motionless and stabbing fish"
    interesting_fact: "Great blue herons are deceptively large — wingspan 66–79 inches. They stand motionless for long periods, then strike at fish with explosive speed. Despite their elegant appearance they make a surprisingly prehistoric croaking sound, fitting for a bird whose body plan has barely changed in millions of years."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Great_Blue_Heron_ogi.jpg/800px-Great_Blue_Heron_ogi.jpg"
    photo_credit: "Wikimedia Commons / Mdf (CC-BY-SA)"
    where_to_spot: "Still water along the Colorado River in Glenwood Springs; pond edges throughout the valley"

  - common_name: "American Dipper"
    scientific_name: "Cinclus mexicanus"
    habitat: "Fast-moving mountain streams and rivers"
    elevation_range: "4,500–11,000 ft along streams"
    active_time: "Daytime — year-round resident of fast streams"
    interesting_fact: "The American dipper is the only truly aquatic songbird in North America. It walks underwater on stream bottoms to catch invertebrates, can swim, and dips repeatedly up and down (the behavior that gives it its name). It has an extra eyelid (nictitating membrane) and can close its nostrils. It sings even in winter — one of the cheerful surprises of cold mountain streams."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Cinclus_mexicanus_-Alaska_-USA-8.jpg/800px-Cinclus_mexicanus_-Alaska_-USA-8.jpg"
    photo_credit: "Wikimedia Commons / Global Senses (CC-BY)"
    where_to_spot: "Fast-moving sections of the Roaring Fork River; any turbulent stream or river in the mountains"

  - common_name: "Clark's Nutcracker"
    scientific_name: "Nucifraga columbiana"
    habitat: "Subalpine forests with whitebark or limber pine; high-elevation forests"
    elevation_range: "8,000–12,000 ft"
    active_time: "Daytime — loud and conspicuous"
    interesting_fact: "Clark's nutcrackers have a sublingual pouch that holds up to 150 pine seeds — they cache tens of thousands of seeds per year in the soil and can remember the locations of thousands of cache sites months later. Their spatial memory drives the regeneration of whitebark pine forests after fire. Lewis and Clark's expedition member described them in 1805."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Clark%27s_Nutcracker_in_Oregon.jpg/800px-Clark%27s_Nutcracker_in_Oregon.jpg"
    photo_credit: "Wikimedia Commons / Gary Leavens (CC-BY-SA)"
    where_to_spot: "Higher forests near Leadville, around Mount Elbert trailhead; any subalpine pine forest"

  - common_name: "Yellow-Bellied Marmot"
    scientific_name: "Marmota flaviventris"
    habitat: "Rocky talus fields, boulder fields, cliff bases, alpine meadow edges"
    elevation_range: "5,500–13,000 ft"
    active_time: "Daytime — highly conspicuous; gives sharp whistle alarm calls"
    interesting_fact: "Yellow-bellied marmots hibernate approximately 8 months of the year — the longest hibernation of any Colorado mammal. During hibernation their heart rate drops from ~120 to 3 beats per minute and body temperature approaches freezing. They emerge in April-May and immediately begin eating to restore the 50% of body mass lost during winter."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/YellowBelliedMarmot.jpg/800px-YellowBelliedMarmot.jpg"
    photo_credit: "Wikimedia Commons / Jon Sullivan (public domain)"
    where_to_spot: "Rocky talus slopes and boulder fields at higher elevations; very common and visible near Leadville"

  - common_name: "American Pika"
    scientific_name: "Ochotona princeps"
    habitat: "Alpine talus fields and boulder slopes above treeline"
    elevation_range: "9,000–13,500 ft"
    active_time: "Daytime — highly vocal; sharp 'eep!' alarm call"
    interesting_fact: "Pikas do not hibernate — they survive winter by caching 'haystacks' of dried plants under boulders all summer. They are a climate change indicator species: because they cannot tolerate heat above ~77°F even briefly, they are retreating to higher and higher elevations as temperatures rise. Some populations have already gone locally extinct."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Ochotona_princeps_in_Colorado.jpg/800px-Ochotona_princeps_in_Colorado.jpg"
    photo_credit: "Wikimedia Commons / National Park Service (public domain)"
    where_to_spot: "Rocky talus above treeline near Leadville; listen for sharp 'eep!' bark from boulder fields"

  - common_name: "American Beaver"
    scientific_name: "Castor canadensis"
    habitat: "Streams, rivers, ponds — any water course with woody vegetation"
    elevation_range: "Along streams and rivers to 9,000 ft"
    active_time: "Crepuscular and nocturnal — most active at dusk and through the night"
    interesting_fact: "Beavers are ecosystem engineers — their dams create wetlands that benefit hundreds of species. A single beaver pond raises the water table across the surrounding landscape, supports riparian vegetation, and provides habitat for amphibians, waterfowl, and mink. They are the second-largest rodent in the world (after capybara). Colorado has been actively using beavers for stream restoration."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/American_Beaver.jpg/800px-American_Beaver.jpg"
    photo_credit: "Wikimedia Commons / Steve from washington, dc, usa (CC-BY-SA)"
    where_to_spot: "Look for dams and lodges in beaver ponds along the Roaring Fork River and side streams; best seen at dusk"

  - common_name: "River Otter"
    scientific_name: "Lontra canadensis"
    habitat: "Clean, fast-moving rivers with fish populations"
    elevation_range: "Along major rivers to 8,000 ft"
    active_time: "Active any time of day; often seen in late afternoon"
    interesting_fact: "River otters were extirpated from Colorado by the 1900s due to trapping and water pollution. Colorado Parks and Wildlife successfully reintroduced them in the 1970s–80s, and they have expanded along the Colorado River system. Seeing an otter in the Colorado River at Glenwood Springs is a genuine wildlife success story. They are playful, social, and fast in the water — look for them body-surfing on rapids."
    photo_url: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Otter_Romp.jpg/800px-Otter_Romp.jpg"
    photo_credit: "Wikimedia Commons / Steve, Washington DC (CC-BY-SA)"
    where_to_spot: "Colorado River through Glenwood Springs; Roaring Fork River; look for sliding areas on riverbanks (otters slide for fun)"
