topics_of_interest:
  # GEOLOGY (Bob-priority — lead with this in every episode)
  - geothermal systems and how they work — why heat rises here and not elsewhere
  - Colorado hot springs geology — mineral content, water chemistry, why each spring is different
  - Rocky Mountain formation — Laramide orogeny, Ancestral Rockies, uplift timeline
  - San Juan Mountains — volcanic calderas, one of the most complex ranges in North America
  - Rio Grande Rift — why the San Luis Valley is the world's largest alpine valley
  - Glenwood Canyon — Precambrian granite, Paleozoic limestone, how the Colorado River cut it
  - fault zones and hot spring emergence — why springs often appear along faults
  - mining history geology — what minerals were where and why (Leadville silver, San Juan gold)
  - Chalk Creek and Collegiate Peaks geology — Mt. Princeton fault zone
  - sedimentary layers visible from the road — reading the rock record

  # PHYSIOLOGY AND SCIENCE (Annette-priority)
  - altitude physiology — why the body feels different above 8,000 ft, acclimatization
  - hot spring chemistry and the body — what minerals do, why sulfur smells, sodium bicarbonate effects
  - plant biology — riparian zones, aspen ecology, wildflowers by elevation band
  - wildflower identification by zone (montane, subalpine, alpine)
  - wildlife ecology — elk, bighorn sheep, marmots, ptarmigan, eagles

  # HISTORY AND CULTURE (both travelers love history — always substantial, never a footnote)
  - Ute Nation history — especially Pagosa Springs ('healing waters'), Steamboat Springs, and their traditional relationship with geothermal sites
  - mining and railroad history — Durango & Silverton, Leadville's silver boom
  - mountain town character and evolution — resort vs. working towns
  - Leadville — highest incorporated city in the US, altitude records, historic figures (Baby Doe Tabor)
  - pack horse and mule train history in Colorado mining towns — the logistics of supply before roads
  - cattle ranching history in mountain parks and San Luis Valley — trail drives, grazing rights, homesteading families
  - Prohibition era in Colorado mountain towns — bootlegging, speakeasies, who enforced the law in remote canyons
  - early automobile roads replacing horse trails — especially Glenwood Canyon (no road existed in the 1920s; railroad and pack horses only)
  - horse culture in Ute and settler communities — breeds, working uses, ceremonial significance
  - 1923-era Colorado: the exact era of mining bust, post-WWI ranching expansion, early automobile tourism replacing horse travel

  # WILDLIFE AND ANIMALS (both travelers are animal lovers and horsemen)
  - wildlife encounters and animal behavior — elk, bighorn sheep, marmots, black bears, eagles, pronghorn
  - horse history in Colorado — pack strings, cavalry remounts, ranch horses, transition to automobiles
  - working animal history — mule pack trains supplying mining camps, oxen on early freight roads
  - wildlife corridors and migration — how the mountain landscape shapes animal movement

  # DRIVE AND SCENERY
  - scenic drives and what to notice — what the landscape is telling you geologically
  - conversation prompts for Annette and Bob — geology trivia, nature observation games, shared reflection

avoid_topics:
  - political content
  - anything requiring speculation without sourcing
  - sensationalized content
  - over-commercialized "spa day" framing — these are wild geothermal systems, not resort amenities

episode_style: "warm, intelligent, vivid, story-driven — like a custom educational audiobook narrated by a knowledgeable friend. Every episode should open with the geology of where we're arriving, then weave in physiology, history, and nature. Bob is the geology anchor; Annette is the science/physiology anchor. Write for two genuinely curious adults who want the real story, not a tourist brochure."

