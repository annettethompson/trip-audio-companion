shared_context:
  currently_watching: "1923 (Paramount+) — Taylor Sheridan's Western ranching drama about the Dutton family in 1920s Montana/West. Both Annette and Bob love it."
  1923_script_rule: "Every episode MUST include at least one '1923 moment' — a specific historical detail from the 1920s or earlier that connects the Colorado landscape to the world they've been watching. Make history tactile by linking it to 1923 scenes and themes."
  1923_connection_examples:
    - "Glenwood Canyon: in the 1920s no road existed — only pack horses and the railroad. The Duttons would have traveled like this."
    - "Mountain town boom/bust: Prohibition bootlegging, early ranching families, horses being replaced by Model Ts — this IS the 1923 era."
    - "San Luis Valley cattle ranching: the kind of wide open range the Duttons would recognize."
    - "Ute people: the reservation was established 1881, just 40 years before 1923's setting — the wounds were still fresh."
  shared_loves:
    - history (both travelers — not Annette-only)
    - animal lovers and horsemen
    - geological storytelling
    - wildlife encounters

